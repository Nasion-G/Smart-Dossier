# Nginx reverse-proxy config for Smart Dossier on Render
# Frontend static files served from /usr/share/nginx/html
# API requests proxied to uvicorn on :8000

server {
    listen 80;
    server_name _;

    # Expo web SPA — serve index.html for all unmatched routes
    root /usr/share/nginx/html;
    index index.html;
    # Max upload size (matches backend MAX_FILE_MB)
    client_max_body_size 10m;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 512;

    # API proxy to FastAPI backend
    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout for AI endpoints (Ollama is slow even when available)
        proxy_read_timeout 120s;
    }

    # Auth endpoints
    location /auth/ {
        proxy_pass http://127.0.0.1:8000/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Cases, documents, health
    location /cases/ {
        proxy_pass http://127.0.0.1:8000/cases/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /documents/ {
        proxy_pass http://127.0.0.1:8000/documents/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_set_header Host $host;
    }

    # SPA fallback — all other requests go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }
}
